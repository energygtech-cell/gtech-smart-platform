<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G-Tech Smart Factory Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080d18;--bg2:#0f1729;--bg3:#162035;--bg4:#1c2a44;
  --bdr:#1e3558;--bdr2:#2a4870;
  --txt:#e2e8f0;--txt2:#94a3b8;--txt3:#64748b;
  --green:#10b981;--gd:#064e3b;--gl:#d1fae5;
  --blue:#3b82f6;--bd:#1e3a8a;--bl:#dbeafe;
  --amber:#f59e0b;--ad:#78350f;--al:#fef3c7;
  --red:#ef4444;--rd:#7f1d1d;--rl:#fee2e2;
  --purple:#8b5cf6;--pd:#4c1d95;--pl:#ede9fe;
  --cyan:#06b6d4;--cd:#164e63;--cl:#cffafe;
  --acc:#00c8e0;--acc2:#0891b2;
}
body{background:var(--bg);color:var(--txt);font-family:'Cairo',sans-serif;font-size:13px;min-height:100vh}
.hidden{display:none!important}
input,select,textarea,button{font-family:'Cairo',sans-serif}
button{cursor:pointer}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}

/* AUTH */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px}
.auth-card{background:var(--bg2);border:1px solid var(--bdr);border-radius:16px;width:100%;max-width:440px;padding:32px}
.auth-logo{text-align:center;margin-bottom:24px}
.auth-logo-icon{width:60px;height:60px;background:linear-gradient(135deg,var(--acc2),var(--purple));border-radius:14px;display:inline-flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:10px}
.auth-logo h1{font-size:22px;font-weight:800;color:var(--txt)}
.auth-logo p{font-size:12px;color:var(--txt2);margin-top:3px}
.auth-tabs{display:flex;background:var(--bg3);border-radius:10px;padding:3px;margin-bottom:22px}
.auth-tab{flex:1;padding:9px;text-align:center;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;color:var(--txt2);border:none;background:transparent;transition:all .2s}
.auth-tab.active{background:var(--acc2);color:#fff}
.form-group{margin-bottom:13px}
.form-label{display:block;font-size:12px;color:var(--txt2);margin-bottom:5px;font-weight:500}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--bdr);border-radius:8px;padding:9px 12px;color:var(--txt);font-size:13px;outline:none;transition:border .2s}
.form-input:focus{border-color:var(--acc)}
.form-input.ltr{direction:ltr;text-align:left}
.form-select{width:100%;background:var(--bg3);border:1px solid var(--bdr);border-radius:8px;padding:9px 12px;color:var(--txt);font-size:13px;outline:none;transition:border .2s}
.form-select:focus{border-color:var(--acc)}
.btn-primary{width:100%;background:var(--acc2);border:none;border-radius:8px;padding:11px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-primary:hover{opacity:.9}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-outline{background:transparent;border:1px solid var(--bdr2);border-radius:8px;padding:7px 14px;color:var(--txt2);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-outline:hover{border-color:var(--acc);color:var(--acc)}
.btn-sm{padding:5px 10px!important;font-size:11px!important;border-radius:6px!important}
.btn-green{background:var(--gd);border-color:var(--green);color:var(--gl)!important}
.btn-red{background:var(--rd);border-color:var(--red);color:var(--rl)!important}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.form-check{display:flex;align-items:flex-start;gap:8px;font-size:11px;color:var(--txt2);cursor:pointer}
.form-check input{margin-top:2px;accent-color:var(--acc);cursor:pointer}
.trial-info{background:rgba(0,200,224,.08);border:1px solid rgba(0,200,224,.2);border-radius:8px;padding:10px 12px;margin-top:14px;font-size:11px;color:var(--acc);display:flex;align-items:center;gap:6px}
.msg-error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:6px;padding:8px 12px;font-size:11px;color:var(--red);margin-bottom:10px}
.msg-success{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);border-radius:6px;padding:8px 12px;font-size:11px;color:var(--green);margin-bottom:10px}
.divider{text-align:center;color:var(--txt3);font-size:11px;margin:14px 0;position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:var(--bdr)}
.divider::before{left:0}.divider::after{right:0}
.auth-lang-bar{display:flex;justify-content:flex-end;margin-bottom:14px;gap:5px;align-items:center}
.auth-lang-btn{padding:4px 13px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--bdr2);background:transparent;color:var(--txt2);transition:all .2s;font-family:'Cairo',sans-serif}
.auth-lang-btn.active{background:var(--acc2);border-color:var(--acc2);color:#fff}
.auth-lang-btn:hover{border-color:var(--acc);color:var(--acc)}

/* APP */
.app{display:flex;flex-direction:column;min-height:100vh}
.trial-bar{background:var(--cd);padding:7px 16px;display:flex;align-items:center;gap:10px;font-size:11px;justify-content:space-between;flex-shrink:0}
.trial-pill{background:rgba(255,255,255,.2);color:#fff;border-radius:10px;padding:2px 10px;font-size:10px;font-weight:700}
.topbar{background:var(--bg2);border-bottom:1px solid var(--bdr);height:52px;display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0}
.logo-sm{display:flex;align-items:center;gap:8px}
.logo-icon-sm{width:32px;height:32px;background:linear-gradient(135deg,var(--acc2),var(--purple));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.spacer{flex:1}
.lang-pill{display:flex;background:var(--bg3);border:1px solid var(--bdr);border-radius:20px;padding:2px;gap:1px}
.lbtn{padding:3px 10px;border-radius:16px;font-size:11px;font-weight:700;border:none;background:transparent;color:var(--txt2);cursor:pointer;transition:all .2s}
.lbtn.active{background:var(--acc2);color:#fff}
.top-btn{width:30px;height:30px;border-radius:7px;border:1px solid var(--bdr);background:transparent;color:var(--txt2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .2s;position:relative}
.top-btn:hover{border-color:var(--acc);color:var(--acc)}
.notif-b::after{content:'';position:absolute;top:3px;right:3px;width:7px;height:7px;background:var(--red);border-radius:50%;border:1px solid var(--bg2)}
.avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;cursor:pointer;color:#fff;flex-shrink:0}
.app-body{display:flex;flex:1;overflow:hidden;height:calc(100vh - 52px)}
.sidebar{width:195px;background:var(--bg2);border-left:1px solid var(--bdr);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sb-sec{padding:12px 10px 3px;font-size:9px;color:var(--txt3);font-weight:700;letter-spacing:.8px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 12px;margin:1px 5px;border-radius:7px;cursor:pointer;color:var(--txt2);font-size:12px;transition:all .2s;user-select:none;direction:rtl}
.nav-item:hover{background:var(--bg3);color:var(--txt)}
.nav-item.active{background:var(--bg4);color:var(--acc);border:1px solid rgba(0,200,224,.15)}
.nav-item i{font-size:15px;flex-shrink:0}
.nbadge{margin-right:auto;background:var(--red);color:#fff;border-radius:8px;padding:1px 5px;font-size:9px;font-weight:700}
.sb-bottom{margin-top:auto;padding:10px 5px;border-top:1px solid var(--bdr)}
.content{flex:1;overflow-y:auto;background:var(--bg);padding:16px}

/* PAGE */
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;direction:rtl}
.ph-title{font-size:17px;font-weight:800;color:var(--txt)}
.ph-sub{font-size:11px;color:var(--txt2);margin-top:1px}
.ph-actions{display:flex;gap:8px}

/* STAT */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.sg3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.sc{background:var(--bg2);border:1px solid var(--bdr);border-radius:12px;padding:12px;direction:rtl;transition:border .2s;cursor:pointer}
.sc:hover{border-color:var(--bdr2)}
.sc-icon{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;margin-bottom:7px}
.sc-lbl{font-size:10px;color:var(--txt2);margin-bottom:3px}
.sc-val{font-size:20px;font-weight:800;color:var(--txt);line-height:1}
.sc-ch{font-size:10px;margin-top:3px}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--bdr);border-radius:12px;padding:13px;margin-bottom:12px}
.card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;direction:rtl}
.card-title{font-size:13px;font-weight:700}
.card-act{font-size:11px;color:var(--acc);cursor:pointer}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}

/* BADGE */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
.b-red{background:var(--rd);color:var(--rl)}
.b-amber{background:var(--ad);color:var(--al)}
.b-blue{background:var(--bd);color:var(--bl)}
.b-green{background:var(--gd);color:var(--gl)}
.b-purple{background:var(--pd);color:var(--pl)}
.b-cyan{background:var(--cd);color:var(--cl)}

/* TABLE */
.tbl-wrap{overflow-x:auto}
.tbl{width:100%;border-collapse:collapse;font-size:12px;direction:rtl}
.tbl th{text-align:right;padding:8px 10px;font-size:10px;color:var(--txt3);font-weight:700;border-bottom:1px solid var(--bdr);text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
.tbl td{padding:8px 10px;border-bottom:1px solid rgba(30,53,88,.4);color:var(--txt2);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(30,53,88,.25)}

/* FAULT FEED */
.ff-item{display:flex;align-items:center;gap:9px;padding:8px 10px;background:var(--bg3);border:1px solid var(--bdr);border-radius:8px;direction:rtl;margin-bottom:6px;animation:slideIn .3s ease}
@keyframes slideIn{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:translateX(0)}}
.ff-icon{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.ff-info{flex:1;min-width:0}
.ff-title{font-size:12px;font-weight:700;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ff-sub{font-size:10px;color:var(--txt2)}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:blink 1.5s infinite;flex-shrink:0;display:inline-block}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* FAULT FORM */
.ftype-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:6px 0 12px}
.ftype-card{background:var(--bg3);border:1px solid var(--bdr);border-radius:8px;padding:10px 6px;text-align:center;cursor:pointer;transition:all .2s;font-size:11px;color:var(--txt2)}
.ftype-card:hover{border-color:var(--bdr2);color:var(--txt)}
.ftype-card.selected{border-color:var(--acc);background:rgba(0,200,224,.08);color:var(--acc)}
.ftype-card i{font-size:22px;display:block;margin-bottom:4px}
.sev-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:6px 0 12px}
.sev-btn{padding:9px 4px;border:1px solid var(--bdr);background:var(--bg3);border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;text-align:center;color:var(--txt2);transition:all .2s}
.sev-btn.s-critical{border-color:var(--red);background:rgba(239,68,68,.1);color:var(--red)}
.sev-btn.s-high{border-color:var(--amber);background:rgba(245,158,11,.1);color:var(--amber)}
.sev-btn.s-medium{border-color:var(--blue);background:rgba(59,130,246,.1);color:var(--blue)}
.sev-btn.s-low{border-color:var(--green);background:rgba(16,185,129,.1);color:var(--green)}

/* DOWNTIME */
.dt-box{background:var(--bg3);border:1px solid var(--bdr);border-radius:8px;padding:12px;margin-top:8px}
.dt-calc{background:rgba(0,200,224,.08);border:1px solid rgba(0,200,224,.2);border-radius:6px;padding:8px 12px;font-size:13px;font-weight:700;color:var(--acc);text-align:center;margin-top:8px}

/* ENERGY */
.shift-card{background:var(--bg3);border:1px solid var(--bdr);border-radius:10px;padding:12px;direction:rtl;transition:border .2s}
.shift-card:hover{border-color:var(--bdr2)}
.shift-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.shift-badge{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700}
.eff-bar{height:8px;background:var(--bg);border-radius:4px;overflow:hidden;margin-top:4px}
.eff-fill{height:100%;border-radius:4px;transition:width .6s}
.team-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:200}
.modal-box{background:var(--bg2);border:1px solid var(--bdr2);border-radius:14px;padding:22px;width:92%;max-width:460px;direction:rtl;max-height:90vh;overflow-y:auto}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}

/* ADMIN PAGE (separate) */
.admin-page{min-height:100vh;background:var(--bg);font-family:'Cairo',sans-serif;direction:rtl}
.admin-topbar{background:var(--purple);padding:12px 20px;display:flex;align-items:center;justify-content:space-between}
.admin-body{padding:20px;max-width:1200px;margin:0 auto}
.client-card{background:var(--bg3);border:1px solid var(--bdr);border-radius:10px;padding:12px;direction:rtl;cursor:pointer;transition:border .2s;margin-bottom:10px}
.client-card:hover{border-color:var(--bdr2)}
.cc-av{width:36px;height:36px;border-radius:8px;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:var(--acc);flex-shrink:0;border:1px solid var(--bdr)}
.pbar-w{height:4px;background:var(--bg);border-radius:2px;overflow:hidden;margin-top:3px}
.pbar{height:100%;border-radius:2px}

/* TOAST */
#toasts{position:fixed;bottom:16px;left:16px;z-index:300;display:flex;flex-direction:column;gap:6px}
.toast{background:var(--bg2);border:1px solid var(--bdr2);border-radius:8px;padding:10px 16px;font-size:12px;display:flex;align-items:center;gap:8px;direction:rtl;animation:slideIn .3s ease}

/* CHAT */
.chat-box{display:flex;flex-direction:column;height:260px}
.chat-msgs{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:8px}
.chat-msg{padding:10px 12px;border-radius:10px;font-size:12px;line-height:1.7;max-width:88%;white-space:pre-wrap}
.chat-msg.bot{background:var(--bg3);border:1px solid var(--bdr);align-self:flex-end;direction:rtl;text-align:right}
.chat-msg.user{background:var(--bd);align-self:flex-start;direction:rtl}
.chat-input-row{display:flex;gap:8px;padding-top:8px;border-top:1px solid var(--bdr)}

/* PROTECTION */
body{-webkit-user-select:none;-moz-user-select:none;user-select:none}
</style>
</head>

<script>
/* ========== HELPERS ========== */
function now(){ return new Date(); }
function fmtDate(d){ return d.getFullYear()+'-'+(d.getMonth()<9?'0':'')+(d.getMonth()+1)+'-'+(d.getDate()<10?'0':'')+d.getDate(); }
function fmtTime(d){ return (d.getHours()<10?'0':'')+d.getHours()+':'+(d.getMinutes()<10?'0':'')+d.getMinutes(); }
function fmtDateTime(d){ return fmtDate(d)+' '+fmtTime(d); }
function calcDowntime(from,to){
  if(!from||!to) return null;
  var a=new Date(from), b=new Date(to);
  if(isNaN(a)||isNaN(b)||b<=a) return null;
  var diff=Math.round((b-a)/60000);
  var h=Math.floor(diff/60), m=diff%60;
  return {minutes:diff, label:(h>0?h+' ساعة ':'')+m+' دقيقة'};
}

/* ========== CHECK ADMIN ROUTE ========== */
(function(){
  var path=window.location.pathname;
  if(path.indexOf('gtech-admin')>-1 || window.location.hash==='#/gtech-admin'){
    renderAdminLoginPage(); return;
  }
  render();

/* ========== RENDER ========== */
function render(){
  destroyCharts();
  if(screen==='auth') renderAuth();
  else renderApp();
}

/* ========== AUTH ========== */
function renderAuth(){
  var isAr=lang==='ar';
  var dir=isAr?'rtl':'ltr';
  var L={

function doLogin(){

  if(p.value.length<3){m.innerHTML='<div class="msg-error">بيانات الدخول غير صحيحة</div>';return;}
  currentUser={name:'أحمد طارق',email:e.value,company:'مصنع G-Tech الذكي',phone:'+966501234567',role:'engineer',trialDays:23};
  screen='app'; currentPage='dashboard';
  render(); showToast('أهلاً بك أحمد! التطبيق جاهز','green');
}

function doRegister(){
  var n=document.getElementById('rN'),e=document.getElementById('rE'),c=document.getElementById('rC'),
      ph=document.getElementById('rPh'),pw=document.getElementById('rPw'),tm=document.getElementById('rT2');
  var m=document.getElementById('authMsg');
  if(!n.value||!e.value||!c.value||!ph.value||!pw.value){m.innerHTML='<div class="msg-error">يرجى ملء جميع الحقول المطلوبة *</div>';return;}
  if(!tm.checked){m.innerHTML='<div class="msg-error">يجب الموافقة على الشروط والأحكام</div>';return;}
  currentUser={name:n.value,email:e.value,company:c.value,phone:ph.value,role:'admin',trialDays:30};
  screen='app'; currentPage='dashboard';
  render(); showToast('تم إنشاء حسابك! مرحباً بك في G-Tech','green');
}

function buildLiveFeed(){
  var el=document.getElementById('liveFeed'); if(!el) return;
  var recent=faults.slice(-4).reverse();
  var sb={critical:'rgba(239,68,68,.15)',high:'rgba(245,158,11,.15)',medium:'rgba(59,130,246,.15)',low:'rgba(16,185,129,.15)'};
  var sc={critical:'#ef4444',high:'#f59e0b',medium:'#3b82f6',low:'#10b981'};
  var bMap={critical:'b-red',high:'b-amber',medium:'b-blue',low:'b-green'};
  var stMap={open:'مفتوح',inprogress:'جارٍ',resolved:'محلول'};
  el.innerHTML=recent.map(function(f){
    var dt=calcDowntime(f.downtimeFrom,f.downtimeTo);
    return '<div class="ff-item">'+
    '<div class="ff-icon" style="background:'+sb[f.severity]+';color:'+sc[f.severity]+'"><i class="ti ti-alert-triangle"></i></div>'+
    '<div class="ff-info"><div class="ff-title">'+f.title+'</div>'+
    '<div class="ff-sub">'+f.machineAr+' · '+f.dateTime+(dt?' · توقف: '+dt.label:'')+'</div></div>'+
    '<span class="badge '+bMap[f.severity]+'">'+f.severity+'</span>'+
    '</div>';
  }).join('');
}

function buildShiftSummary(){
  var el=document.getElementById('shiftSummary'); if(!el) return;
  var today=fmtDate(now());
  var todayLogs=energyLogs.filter(function(e){return e.date===today;});
  if(!todayLogs.length){el.innerHTML='<div style="color:var(--txt3);font-size:12px;padding:10px;text-align:center">لا توجد ورديات مسجلة اليوم</div>';return;}
  var teams={};
  todayLogs.forEach(function(l){
    var k='فريق '+l.team+' - '+l.shiftName;
    if(!teams[k]) teams[k]={kwh:0,prod:0,team:l.team,shift:l.shiftName};
    teams[k].kwh+=l.kwh; teams[k].prod+=l.production;
  });
  var tColors=['#00c8e0','#8b5cf6','#10b981'];
  var html='';
  Object.keys(teams).forEach(function(k,i){
    var t=teams[k];
    var eff=t.prod>0?Math.round(t.prod/(t.kwh)*10)/10:0;
    html+='<div class="ff-item" style="margin-bottom:6px">'+
    '<div class="team-dot" style="background:'+tColors[i%3]+';margin:0 4px"></div>'+
    '<div class="ff-info"><div class="ff-title">'+k+'</div>'+
    '<div class="ff-sub">'+t.kwh.toFixed(1)+' kWh · '+t.prod+' وحدة</div></div>'+
    '<div style="text-align:left;font-size:11px">'+
    '<div style="color:var(--green);font-weight:700">'+eff+' و/kWh</div>'+
    '<div style="color:var(--txt3)">كفاءة</div></div>'+
    '</div>';
  });
  el.innerHTML=html;
}

function buildDashCharts(){
  var fc=document.getElementById('ftChart');
  if(fc){
    var types={mechanical:0,hydraulic:0,electrical:0,thermal:0,sensor:0};
    faults.forEach(function(f){if(types[f.type]!==undefined)types[f.type]++;});
    charts.ft=new Chart(fc,{type:'bar',data:{
      labels:['ميكانيكي','هيدروليك','كهربائي','حراري','حساسات'],
      datasets:[{data:[types.mechanical,types.hydraulic,types.electrical,types.thermal,types.sensor],
        backgroundColor:['#ef4444','#f59e0b','#3b82f6','#8b5cf6','#10b981'],borderRadius:4}]
    },options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#64748b',font:{size:9}}},
              y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#64748b',font:{size:9},stepSize:1}}}}});
  }
}

function updateDTCalc(){
  var from=document.getElementById('dtFrom');
  var to=document.getElementById('dtTo');
  var res=document.getElementById('dtCalcResult');
  if(!from||!to||!res) return;
  if(from.value && to.value){
    var dt=calcDowntime(from.value.replace('T',' '),to.value.replace('T',' '));
    if(dt){
      res.style.display='block';
      res.innerHTML='<i class="ti ti-clock" style="margin-left:6px"></i>مدة التوقف: <strong>'+dt.label+'</strong> ('+dt.minutes+' دقيقة)';
    } else {
      res.style.display='block';
      res.innerHTML='<span style="color:var(--red)">⚠ تاريخ النهاية يجب أن يكون بعد البداية</span>';
    }
  } else {
    res.style.display='none';
  }
}

function submitFault(){
  var tEl=document.getElementById('fTitle');
  var mEl=document.getElementById('fMachine');
  var sEl=document.getElementById('fStatus');
  var nEl=document.getElementById('fNotes');
  var dtF=document.getElementById('dtFrom');
  var dtT=document.getElementById('dtTo');
  var msg=document.getElementById('fMsg');
  if(!selType||!selSev||!tEl||!tEl.value.trim()){
    if(msg) msg.innerHTML='<div class="msg-error">يرجى تحديد نوع العطل والخطورة وإدخال وصف</div>';
    return;
  }
  var nowDT=fmtDateTime(now());
  var dtFrom=dtF&&dtF.value?dtF.value.replace('T',' '):'';
  var dtTo=dtT&&dtT.value?dtT.value.replace('T',' '):'';
  var typeArMap={mechanical:'ميكانيكي',electrical:'كهربائي',hydraulic:'هيدروليك',thermal:'حراري',sensor:'حساسات',structural:'هيكلي'};
  var mVal=mEl?mEl.value:'CNC A1';
  var mArMap={'CNC A1':'ماكينة CNC أ1','Press B2':'مكبس هيدروليكي ب2','Conveyor':'خط النقل'};
  var newFault={
    id:faults.length+1,
    type:selType, typeAr:typeArMap[selType]||selType,
    title:tEl.value.trim(),
    machine:mVal, machineAr:mArMap[mVal]||mVal,
    severity:selSev,
    dateTime:nowDT,
    downtimeFrom:dtFrom,
    downtimeTo:dtTo,
    status:sEl?sEl.value:'open',
    notes:nEl?nEl.value:''
  };
  faults.push(newFault);
  selType=''; selSev='';
  showToast('تم تسجيل العطل بتاريخ '+nowDT+' وإضافته للداش بورد','green');
  navigate('dashboard');
}

function renderShiftCards(){
  var el=document.getElementById('shiftCardsArea'); if(!el) return;
  var dateEl=document.getElementById('energyDate');
  var date=dateEl?dateEl.value:fmtDate(now());
  var dayLogs=energyLogs.filter(function(e){return e.date===date;});
  var tColors=['#00c8e0','#8b5cf6','#10b981'];
  var shiftNames={1:['صباحي'],2:['صباحي','مسائي'],3:['صباحي','مسائي','ليلي']};
  var sNames=shiftNames[shiftConfig.shiftsPerDay]||['صباحي'];

  var html='<div style="margin-bottom:12px"><div class="g'+Math.min(shiftConfig.teams*shiftConfig.shiftsPerDay,4)+' " style="display:grid;grid-template-columns:repeat('+Math.min(shiftConfig.teams*shiftConfig.shiftsPerDay,3)+',1fr);gap:10px;margin-bottom:12px">';
  for(var t=1;t<=shiftConfig.teams;t++){
    sNames.forEach(function(sn,si){
      var logs=dayLogs.filter(function(l){return l.team===t&&l.shiftName===sn;});
      var kwh=logs.reduce(function(a,b){return a+b.kwh;},0);
      var prod=logs.reduce(function(a,b){return a+b.production;},0);
      var eff=kwh>0?(prod/kwh).toFixed(1):'-';
      var color=tColors[(t-1)%3];
      html+='<div class="shift-card">'+
      '<div class="shift-header">'+
      '<div style="font-size:12px;font-weight:700;color:var(--txt)">فريق '+t+' · '+sn+'</div>'+
      '<span class="shift-badge" style="background:rgba(0,0,0,.3);color:'+color+';border:1px solid '+color+'">'+
      (logs.length?'مسجّل':'لم يُسجَّل')+'</span></div>'+
      '<div style="display:flex;gap:16px;font-size:11px;margin-bottom:8px">'+
      '<div><div style="color:var(--txt3)">الطاقة</div><div style="font-size:16px;font-weight:800;color:'+color+'">'+kwh.toFixed(1)+'</div><div style="color:var(--txt3);font-size:9px">kWh</div></div>'+
      '<div><div style="color:var(--txt3)">الإنتاج</div><div style="font-size:16px;font-weight:800">'+prod+'</div><div style="color:var(--txt3);font-size:9px">وحدة</div></div>'+
      '<div><div style="color:var(--txt3)">الكفاءة</div><div style="font-size:16px;font-weight:800;color:var(--green)">'+eff+'</div><div style="color:var(--txt3);font-size:9px">و/kWh</div></div>'+
      '</div>'+
      '<div style="font-size:9px;color:var(--txt3);margin-bottom:3px">كفاءة الطاقة</div>'+
      '<div class="eff-bar"><div class="eff-fill" style="width:'+Math.min(parseFloat(eff)*10||0,100)+'%;background:'+color+'"></div></div>'+
      '<button class="btn-outline btn-sm" style="width:100%;justify-content:center;margin-top:8px" onclick="showAddEnergyModal('+t+',\''+sn+'\')">'+
      '<i class="ti ti-plus"></i> '+(logs.length?'تعديل / إضافة':'تسجيل الاستهلاك')+'</button>'+
      '</div>';
    });
  }
  html+='</div></div>';
  el.innerHTML=html;
}

  var dateEl=document.getElementById('energyDate');
  var date=dateEl?dateEl.value:'';

function renderEnergyChart(){
  var el=document.getElementById('energyChart'); if(!el) return;
  var days={};
  energyLogs.forEach(function(l){
    if(!days[l.date]) days[l.date]={kwh:0,prod:0};
    days[l.date].kwh+=l.kwh;
    days[l.date].prod+=l.production;
  });
  var labels=Object.keys(days).sort();
  var kwhData=labels.map(function(d){return parseFloat(days[d].kwh.toFixed(1));});
  charts.energy=new Chart(el,{type:'bar',data:{
    labels:labels,
    datasets:[{label:'kWh',data:kwhData,backgroundColor:'rgba(0,200,224,.7)',borderRadius:4}]
  },options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
    scales:{x:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#64748b',font:{size:9}}},
            y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#64748b',font:{size:9}}}}}});
}

  '<input class="form-input" id="eNotes" placeholder="أي ملاحظات على هذه الوردية..."></div>'+
  '<div id="eMsgBox"></div>'+
  '<button class="btn-primary" onclick="submitEnergy()"><i class="ti ti-check"></i> حفظ سجل الطاقة</button>'+
  '</div></div>';

  document.getElementById('eKwh').addEventListener('input',calcEff);
  document.getElementById('eProd').addEventListener('input',calcEff);
}

function calcEff(){
  var k=parseFloat(document.getElementById('eKwh').value)||0;
  var p=parseFloat(document.getElementById('eProd').value)||0;
  var box=document.getElementById('eEffCalc');
  var val=document.getElementById('eEffVal');
  if(k>0&&p>0&&box&&val){
    box.style.display='block';
    val.textContent=(p/k).toFixed(2);
  }
}

function submitEnergy(){
  var team=parseInt(document.getElementById('eTeam').value);
  var shift=document.getElementById('eShift').value;
  var date=document.getElementById('eDate').value;
  var from=document.getElementById('eFrom').value;
  var to=document.getElementById('eTo').value;
  var machine=document.getElementById('eMachine').value;
  var kwh=parseFloat(document.getElementById('eKwh').value);
  var prod=parseInt(document.getElementById('eProd').value);
  var notes=document.getElementById('eNotes').value;
  var msg=document.getElementById('eMsgBox');
  if(!date||isNaN(kwh)||kwh<=0||isNaN(prod)||prod<0){
    if(msg) msg.innerHTML='<div class="msg-error">يرجى ملء التاريخ والاستهلاك والإنتاج</div>';
    return;
  }
  energyLogs.push({id:energyLogs.length+1,date:date,team:team,shift:shift.charAt(0),shiftName:shift,
    timeFrom:from,timeTo:to,machine:machine,kwh:kwh,production:prod,notes:notes});
  closeModal();
  showToast('تم تسجيل استهلاك فريق '+team+' وردية '+shift+': '+kwh+' kWh','green');
  navigate('energy');
}

async function sendAI(){

  var msgs=document.getElementById('chatMsgs');
  if(!inp||!msgs||!inp.value.trim()) return;
  var q=inp.value.trim(); inp.value='';
  var uDiv=document.createElement('div');
  uDiv.className='chat-msg user'; uDiv.textContent=q;
  msgs.appendChild(uDiv); msgs.scrollTop=msgs.scrollHeight;
  var bDiv=document.createElement('div');
  bDiv.className='chat-msg bot'; bDiv.textContent='⟳ جاري التحليل...';
  msgs.appendChild(bDiv); msgs.scrollTop=msgs.scrollHeight;
  try{
    var res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,

        messages:[{role:'user',content:q}]})

  }catch(e){bDiv.textContent='تعذر الاتصال. تواصل مع info@gtech-a.com';}

}
