<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G-Tech Smart Factory</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080d18;--bg2:#0f1729;--bg3:#162035;--bg4:#1c2a44;
  --bdr:#1e3558;--bdr2:#2a4870;
  --txt:#e2e8f0;--txt2:#94a3b8;--txt3:#64748b;
  --green:#10b981;--gd:#064e3b;--gl:#d1fae5;
  --blue:#3b82f6;--bd:#1e3a8a;--bl:#dbeafe;
  --amber:#f59e0b;--ad:#78350f;--al:#fef3c7;
  --red:#ef4444;--rd:#7f1d1d;--rl:#fee2e2;
  --purple:#8b5cf6;--pd:#4c1d95;--pl:#ede9fe;
  --cyan:#06b6d4;--cd:#164e63;--cl:#cffafe;
  --acc:#00c8e0;--acc2:#0891b2;
}
body{background:var(--bg);color:var(--txt);font-family:'Cairo',sans-serif;font-size:13px;min-height:100vh}
.hidden{display:none!important}
input,select,textarea,button{font-family:'Cairo',sans-serif}
button{cursor:pointer}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}

/* ===== AUTH ===== */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:16px}
.auth-card{background:var(--bg2);border:1px solid var(--bdr);border-radius:16px;width:100%;max-width:480px;padding:28px}
.auth-logo{text-align:center;margin-bottom:20px}
.auth-logo-icon{width:56px;height:56px;background:linear-gradient(135deg,var(--acc2),var(--purple));border-radius:14px;display:inline-flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:8px}
.auth-logo h1{font-size:20px;font-weight:800}
.auth-logo p{font-size:11px;color:var(--txt2);margin-top:2px}
.auth-tabs{display:flex;background:var(--bg3);border-radius:10px;padding:3px;margin-bottom:20px}
.auth-tab{flex:1;padding:8px;text-align:center;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;color:var(--txt2);border:none;background:transparent;transition:all .2s}
.auth-tab.active{background:var(--acc2);color:#fff}
.lang-bar{display:flex;justify-content:flex-end;margin-bottom:14px;gap:5px;align-items:center}
.lbtn2{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--bdr2);background:transparent;color:var(--txt2);transition:all .2s;font-family:'Cairo',sans-serif}
.lbtn2.active{background:var(--acc2);border-color:var(--acc2);color:#fff}
.step-indicator{display:flex;align-items:center;gap:0;margin-bottom:20px;direction:ltr}
.step-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;transition:all .3s}
.step-dot.done{background:var(--green);color:#fff}
.step-dot.active{background:var(--acc2);color:#fff}
.step-dot.todo{background:var(--bg3);color:var(--txt3);border:1px solid var(--bdr)}
.step-line{flex:1;height:2px;background:var(--bdr)}
.step-line.done{background:var(--green)}
.fg{margin-bottom:12px}
.fl{display:block;font-size:11px;color:var(--txt2);margin-bottom:4px;font-weight:600}
.fi{width:100%;background:var(--bg3);border:1px solid var(--bdr);border-radius:8px;padding:9px 11px;color:var(--txt);font-size:13px;outline:none;transition:border .2s;font-family:'Cairo',sans-serif}
.fi:focus{border-color:var(--acc)}
.fi.ltr{direction:ltr;text-align:left}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.frow3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.fcheck{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--txt2);cursor:pointer}
.fcheck input{accent-color:var(--acc)}
.btnp{width:100%;background:var(--acc2);border:none;border-radius:8px;padding:11px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:opacity .2s}
.btnp:hover{opacity:.9}
.btnp:disabled{opacity:.5;cursor:not-allowed}
.btno{background:transparent;border:1px solid var(--bdr2);border-radius:7px;padding:7px 13px;color:var(--txt2);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:5px}
.btno:hover{border-color:var(--acc);color:var(--acc)}
.bsm{padding:5px 10px!important;font-size:11px!important;border-radius:6px!important}
.msg-e{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:6px;padding:8px 12px;font-size:11px;color:var(--red);margin-bottom:10px}
.msg-s{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);border-radius:6px;padding:8px 12px;font-size:11px;color:var(--green);margin-bottom:10px}
.trial-info{background:rgba(0,200,224,.07);border:1px solid rgba(0,200,224,.2);border-radius:8px;padding:9px 12px;margin-top:12px;font-size:11px;color:var(--acc);display:flex;align-items:center;gap:6px}

/* machine/shift builder */
.machine-builder{display:flex;flex-direction:column;gap:8px;margin-top:6px}
.machine-row{background:var(--bg3);border:1px solid var(--bdr);border-radius:8px;padding:10px 12px;display:flex;align-items:center;gap:8px;direction:rtl}
.shift-builder{display:flex;flex-direction:column;gap:8px;margin-top:6px}
.shift-row{background:var(--bg3);border:1px solid var(--bdr);border-radius:8px;padding:10px 12px;direction:rtl}
.add-btn{background:rgba(0,200,224,.08);border:1px dashed rgba(0,200,224,.3);border-radius:8px;padding:9px;text-align:center;cursor:pointer;font-size:12px;color:var(--acc);transition:all .2s;margin-top:4px}
.add-btn:hover{background:rgba(0,200,224,.14)}
.remove-btn{width:24px;height:24px;border-radius:50%;border:none;background:rgba(239,68,68,.15);color:var(--red);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* ===== APP ===== */
.app{display:flex;flex-direction:column;min-height:100vh}
.trial-bar{background:var(--cd);padding:6px 16px;display:flex;align-items:center;justify-content:space-between;font-size:11px;flex-shrink:0}
.topbar{background:var(--bg2);border-bottom:1px solid var(--bdr);height:50px;display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0}
.logo-sm{display:flex;align-items:center;gap:8px}
.logo-icon-sm{width:30px;height:30px;background:linear-gradient(135deg,var(--acc2),var(--purple));border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.spacer{flex:1}
.lang-pill{display:flex;background:var(--bg3);border:1px solid var(--bdr);border-radius:20px;padding:2px;gap:1px}
.lbtn{padding:3px 9px;border-radius:16px;font-size:11px;font-weight:700;border:none;background:transparent;color:var(--txt2);cursor:pointer;transition:all .2s}
.lbtn.active{background:var(--acc2);color:#fff}
.tbtn{width:30px;height:30px;border-radius:7px;border:1px solid var(--bdr);background:transparent;color:var(--txt2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .2s;position:relative}
.tbtn:hover{border-color:var(--acc);color:var(--acc)}
.notif-b::after{content:'';position:absolute;top:3px;right:3px;width:7px;height:7px;background:var(--red);border-radius:50%;border:1px solid var(--bg2)}
.avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;cursor:pointer;color:#fff;flex-shrink:0}
.app-body{display:flex;flex:1;overflow:hidden;height:calc(100vh - 50px)}
.sidebar{width:190px;background:var(--bg2);border-left:1px solid var(--bdr);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sb-sec{padding:10px 10px 3px;font-size:9px;color:var(--txt3);font-weight:700;letter-spacing:.8px}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 11px;margin:1px 5px;border-radius:7px;cursor:pointer;color:var(--txt2);font-size:12px;transition:all .2s;user-select:none;direction:rtl}
.nav-item:hover{background:var(--bg3);color:var(--txt)}
.nav-item.active{background:var(--bg4);color:var(--acc);border:1px solid rgba(0,200,224,.15)}
.nav-item i{font-size:15px;flex-shrink:0}
.nbadge{margin-right:auto;background:var(--red);color:#fff;border-radius:8px;padding:1px 5px;font-size:9px;font-weight:700}
.sb-bottom{margin-top:auto;padding:8px 5px;border-top:1px solid var(--bdr)}
.content{flex:1;overflow-y:auto;background:var(--bg);padding:14px}

/* page */
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px;direction:rtl}
.ph-title{font-size:16px;font-weight:800}
.ph-sub{font-size:11px;color:var(--txt2);margin-top:1px}
.ph-actions{display:flex;gap:7px}

/* stats */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:13px}
.sg3{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:13px}
.sc{background:var(--bg2);border:1px solid var(--bdr);border-radius:11px;padding:11px;direction:rtl;transition:border .2s;cursor:pointer}
.sc:hover{border-color:var(--bdr2)}
.sc-icon{width:31px;height:31px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;margin-bottom:6px}
.sc-lbl{font-size:10px;color:var(--txt2);margin-bottom:3px}
.sc-val{font-size:20px;font-weight:800;line-height:1}
.sc-ch{font-size:10px;margin-top:3px}

/* cards */
.card{background:var(--bg2);border:1px solid var(--bdr);border-radius:11px;padding:12px;margin-bottom:11px}
.card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;direction:rtl}
.card-title{font-size:12px;font-weight:700}
.card-act{font-size:11px;color:var(--acc);cursor:pointer}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}

/* badge */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
.b-red{background:var(--rd);color:var(--rl)}.b-amber{background:var(--ad);color:var(--al)}
.b-blue{background:var(--bd);color:var(--bl)}.b-green{background:var(--gd);color:var(--gl)}
.b-purple{background:var(--pd);color:var(--pl)}.b-cyan{background:var(--cd);color:var(--cl)}

/* table */
.tbl-wrap{overflow-x:auto}
.tbl{width:100%;border-collapse:collapse;font-size:12px;direction:rtl}
.tbl th{text-align:right;padding:7px 9px;font-size:10px;color:var(--txt3);font-weight:700;border-bottom:1px solid var(--bdr);white-space:nowrap}
.tbl td{padding:8px 9px;border-bottom:1px solid rgba(30,53,88,.4);color:var(--txt2);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(30,53,88,.2)}

/* fault form */
.ftype-sel{width:100%;background:var(--bg3);border:1px solid var(--bdr);border-radius:8px;padding:9px 11px;color:var(--txt);font-size:13px;outline:none;transition:border .2s;font-family:'Cairo',sans-serif}
.ftype-sel:focus{border-color:var(--acc)}
.sev-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin:6px 0 11px}
.sev-btn{padding:9px 4px;border:1px solid var(--bdr);background:var(--bg3);border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;text-align:center;color:var(--txt2);transition:all .2s}
.sev-btn.s-critical{border-color:var(--red);background:rgba(239,68,68,.1);color:var(--red)}
.sev-btn.s-high{border-color:var(--amber);background:rgba(245,158,11,.1);color:var(--amber)}
.sev-btn.s-medium{border-color:var(--blue);background:rgba(59,130,246,.1);color:var(--blue)}
.sev-btn.s-low{border-color:var(--green);background:rgba(16,185,129,.1);color:var(--green)}
.dt-box{background:var(--bg3);border:1px solid var(--bdr);border-radius:8px;padding:11px;margin-top:8px}
.dt-calc{background:rgba(0,200,224,.08);border:1px solid rgba(0,200,224,.2);border-radius:6px;padding:8px 12px;font-size:13px;font-weight:700;color:var(--acc);text-align:center;margin-top:8px;display:none}

/* filter bar */
.filter-bar{display:flex;gap:8px;align-items:center;direction:rtl;flex-wrap:wrap;margin-bottom:11px;background:var(--bg2);border:1px solid var(--bdr);border-radius:9px;padding:10px 12px}
.fi-sm{background:var(--bg3);border:1px solid var(--bdr);border-radius:7px;padding:6px 10px;color:var(--txt);font-size:12px;outline:none;font-family:'Cairo',sans-serif}
.fi-sm:focus{border-color:var(--acc)}
.fi-sm.ltr{direction:ltr}

/* ff item */
.ff-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg3);border:1px solid var(--bdr);border-radius:8px;direction:rtl;margin-bottom:5px;animation:slideIn .3s ease}
@keyframes slideIn{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:translateX(0)}}
.ff-icon{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.ff-info{flex:1;min-width:0}
.ff-title{font-size:12px;font-weight:700;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ff-sub{font-size:10px;color:var(--txt2)}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:blink 1.5s infinite;flex-shrink:0;display:inline-block}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* energy */
.shift-card{background:var(--bg3);border:1px solid var(--bdr);border-radius:10px;padding:11px;direction:rtl;transition:border .2s}
.shift-card:hover{border-color:var(--bdr2)}
.eff-bar{height:7px;background:var(--bg);border-radius:4px;overflow:hidden;margin-top:3px}
.eff-fill{height:100%;border-radius:4px;transition:width .6s}
.energy-alert{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:9px;padding:12px 14px;margin-bottom:12px;direction:rtl;display:flex;align-items:flex-start;gap:10px}
.energy-alert-pending{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);border-radius:9px;padding:12px 14px;margin-bottom:12px;direction:rtl;display:flex;align-items:flex-start;gap:10px}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:200}
.modal-box{background:var(--bg2);border:1px solid var(--bdr2);border-radius:13px;padding:20px;width:92%;max-width:460px;direction:rtl;max-height:90vh;overflow-y:auto}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}

/* toast */
#toasts{position:fixed;bottom:14px;left:14px;z-index:300;display:flex;flex-direction:column;gap:5px}
.toast{background:var(--bg2);border:1px solid var(--bdr2);border-radius:8px;padding:9px 14px;font-size:12px;display:flex;align-items:center;gap:7px;direction:rtl;animation:slideIn .3s ease}

/* chat */
.chat-box{display:flex;flex-direction:column;height:250px}
.chat-msgs{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:7px}
.chat-msg{padding:9px 11px;border-radius:10px;font-size:12px;line-height:1.7;max-width:88%;white-space:pre-wrap}
.chat-msg.bot{background:var(--bg3);border:1px solid var(--bdr);align-self:flex-end;direction:rtl;text-align:right}
.chat-msg.user{background:var(--bd);align-self:flex-start;direction:rtl}
.chat-input-row{display:flex;gap:7px;padding-top:8px;border-top:1px solid var(--bdr)}

/* admin */
.admin-page{min-height:100vh;background:var(--bg);font-family:'Cairo',sans-serif;direction:rtl}
.admin-topbar{background:var(--purple);padding:11px 18px;display:flex;align-items:center;justify-content:space-between}
.client-card{background:var(--bg3);border:1px solid var(--bdr);border-radius:10px;padding:11px;direction:rtl;cursor:pointer;transition:border .2s;margin-bottom:9px}
.client-card:hover{border-color:var(--bdr2)}
.cc-av{width:34px;height:34px;border-radius:8px;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:var(--acc);flex-shrink:0;border:1px solid var(--bdr)}
.pbar-w{height:4px;background:var(--bg);border-radius:2px;overflow:hidden;margin-top:3px}
.pbar{height:100%;border-radius:2px}

body{-webkit-user-select:none;-moz-user-select:none;user-select:none}
</style>
</head>
<body>
<div id="root"></div>
<div id="toasts"></div>
<div id="modal"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ============================================================
   SUPABASE CONFIG
============================================================ */
var SUPA_URL = 'https://kdlvzhrynozyebazxzcb.supabase.co';
var SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtkbHZ6aHJ5bm96eWViYXp4emNiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4MTg0MjUsImV4cCI6MjA5NjM5NDQyNX0.DiKa_mMzsyi1FbHXQT4CPo8XwPepahv5UqdpC67hgz8';
var supa = supabase.createClient(SUPA_URL, SUPA_KEY);

/* ============================================================
   SUPABASE AUTH & DATA FUNCTIONS
============================================================ */

/* --- REGISTER (no email confirmation) --- */
async function supaRegister(userData, machines, shifts) {
  try {
    /* Check if email already exists */
    var { data: existing } = await supa.from('users').select('id').eq('email', userData.email).single();
    if(existing) return { error: 'البريد الإلكتروني مسجّل مسبقاً' };

    /* Generate a simple user ID */
    var userId = crypto.randomUUID ? crypto.randomUUID() : uid()+uid();

    /* Save user directly to users table */
    var { error: uErr } = await supa.from('users').insert({
      id: userId,
      name: userData.name,
      email: userData.email,
      phone: userData.phone,
      company: userData.company,
      industry: userData.industry,
      password_hash: btoa(userData.pw),
      trial_days: 30,
      plan: 'trial',
      role: 'admin'
    });
    if(uErr) return { error: uErr.message };

    /* Save machines */
    if(machines.length) {
      var mRows = machines.map(function(m) {
        return { id: m.id, user_id: userId, name: m.name, type: m.type };
      });
      var { error: mErr } = await supa.from('machines').insert(mRows);
      if(mErr) return { error: mErr.message };
    }

    /* Save shifts */
    if(shifts.length) {
      var sRows = shifts.map(function(s) {
        return { id: s.id, user_id: userId, name: s.name, leader: s.leader,
                 time_from: s.timeFrom, time_to: s.timeTo, color: s.color };
      });
      var { error: sErr } = await supa.from('shifts').insert(sRows);
      if(sErr) return { error: sErr.message };
    }

    return { uid: userId };
  } catch(e) { return { error: e.message }; }
}

/* --- LOGIN (direct DB check, no Auth) --- */
async function supaLogin(email, pw) {
  try {
    /* Fetch user by email */
    var { data: user, error: uErr } = await supa.from('users')
      .select('*').eq('email', email).single();
    if(uErr || !user) return { error: 'البريد الإلكتروني غير موجود' };

    /* Check password */
    if(pw !== '__session__') {
      var storedHash = user.password_hash;
      if(storedHash !== btoa(pw)) return { error: 'كلمة المرور غير صحيحة' };
    }

    /* Fetch machines */
    var { data: machines } = await supa.from('machines')
      .select('*').eq('user_id', user.id).order('created_at');

    /* Fetch shifts */
    var { data: shifts } = await supa.from('shifts')
      .select('*').eq('user_id', user.id).order('created_at');

    return { user, machines: machines||[], shifts: shifts||[] };
  } catch(e) { return { error: e.message }; }
}

/* --- LOAD USER DATA --- */
async function supaLoadData(uid) {
  var { data: faultsData } = await supa.from('faults')
    .select('*').eq('user_id', uid).order('created_at', { ascending: false });
  var { data: energyData } = await supa.from('energy_readings')
    .select('*').eq('user_id', uid).order('created_at', { ascending: false });
  return { faults: faultsData||[], energy: energyData||[] };
}

/* --- SAVE FAULT --- */
async function supaAddFault(uid, fault) {
  var row = {
    user_id: uid, machine_id: null,
    machine_name: fault.machineName, type_id: fault.typeId,
    type_ar: fault.typeAr, severity: 'medium',
    date_time: fault.dateTime, downtime_from: fault.downtimeFrom,
    downtime_to: fault.downtimeTo, status: fault.status, notes: fault.notes
  };
  var { data, error } = await supa.from('faults').insert(row).select().single();
  if(error) return { error: error.message };
  return { data };
}

/* --- CLOSE FAULT --- */
async function supaCloseFault(faultId, downtimeTo) {
  var { error } = await supa.from('faults')
    .update({ status: 'resolved', downtime_to: downtimeTo }).eq('id', faultId);
  return error ? { error: error.message } : { ok: true };
}

/* --- SAVE ENERGY READING --- */
async function supaAddEnergy(uid, reading) {
  var row = {
    user_id: uid, shift_id: reading.shiftId||null,
    shift_name: reading.shiftName, machine_id: null,
    machine_name: reading.machineName, date: reading.date,
    time: reading.time, meter_reading: reading.meterReading,
    prev_reading: reading.prevReading||0, kwh: reading.kwh,
    production: reading.production, notes: reading.notes||''
  };
  var { data, error } = await supa.from('energy_readings').insert(row).select().single();
  if(error) return { error: error.message };
  return { data };
}

/* --- LOGOUT --- */
async function supaLogout() {
  /* No Supabase Auth session to clear */
  localStorage.removeItem('gtech_user_email');
  localStorage.removeItem('gtech_user_pw');
}

/* --- CHECK SESSION ON LOAD --- */
async function checkSession() {
  var savedEmail = localStorage.getItem('gtech_user_email');
  var savedPw = localStorage.getItem('gtech_user_pw');
  if(savedEmail && savedPw) {
    var res = await supaLogin(savedEmail, savedPw);
    if(!res.error && res.user) return res;
  }
  return null;
}

  energyReadings = (dataRes.energy||[]).map(function(e) {

function calcDT(from,to){
  if(!from||!to) return null;

function finishReg(){
  var m=document.getElementById('authMsg');
  if(!regData.shifts.length||regData.shifts.some(function(x){return !x.name.trim();})){
    m.innerHTML='<div class="msg-e">'+(lang==='ar'?'أضف وردية واحدة على الأقل':'Add at least one shift with a name')+'</div>';return;
  }
  var btn=document.querySelector('#wizardStep .btnp');
  if(btn){btn.disabled=true;btn.innerHTML='<i class="ti ti-loader"></i> '+(lang==='ar'?'جاري الإنشاء...':'Creating...');}
  m.innerHTML='';
  var mList=regData.machines.map(function(mx){return{id:uid(),name:mx.name,type:mx.type};});
  var sList=regData.shifts.map(function(s,i){return{id:uid(),name:s.name,leader:s.leader,timeFrom:s.timeFrom,timeTo:s.timeTo,color:s.color||shiftColors[i%5]};});
  supaRegister(regData, mList, sList).then(function(res){
    if(res.error){
      m.innerHTML='<div class="msg-e">'+res.error+'</div>';
      if(btn){btn.disabled=false;btn.innerHTML='<i class="ti ti-check"></i> '+(lang==='ar'?'إنشاء الحساب':'Create Account');}
      return;
    }
    currentUser={
      id:res.uid,name:regData.name,email:regData.email,company:regData.company,
      phone:regData.phone,role:'admin',trialDays:30,plan:'trial',
      machines:mList, shifts:sList
    };
    faults=[];energyReadings=[];
    authStep=1;
    regData={name:'',email:'',phone:'',company:'',industry:'تصنيع',pw:'',machines:[],shifts:[]};
    screen='app';currentPage='dashboard';
    render();showToast((lang==='ar'?'مرحباً ':'Welcome ')+currentUser.name+' 🎉','green');
  });
}

function doLogin(){
  var e=document.getElementById('lE'),p=document.getElementById('lP'),m=document.getElementById('authMsg');
  if(!e.value||!p.value){m.innerHTML='<div class="msg-e">'+(lang==='ar'?'يرجى ملء جميع الحقول':'Fill all fields')+'</div>';return;}
  var btn=document.querySelector('.auth-card .btnp');
  if(btn){btn.disabled=true;btn.innerHTML='<i class="ti ti-loader"></i> '+(lang==='ar'?'جاري الدخول...':'Signing in...');}
  m.innerHTML='';
  supaLogin(e.value, p.value).then(function(res){
    if(res.error){
      m.innerHTML='<div class="msg-e">'+(lang==='ar'?res.error:'Invalid email or password')+'</div>';
      if(btn){btn.disabled=false;btn.innerHTML='<i class="ti ti-login"></i> '+(lang==='ar'?'دخول':'Sign In');}
      return;
    }
    /* Save session in localStorage */
    try{localStorage.setItem('gtech_user_email',e.value);localStorage.setItem('gtech_user_pw',p.value);}catch(ex){}
    supaLoadData(res.user.id).then(function(dataRes){

      render();showToast((lang==='ar'?'أهلاً بك ':'Welcome ')+currentUser.name,'green');

  });

function buildLiveFeed(){
  var el=document.getElementById('liveFeed');if(!el)return;
  var recent=faults.slice(-4).reverse();
  var sbg={critical:'rgba(239,68,68,.15)',high:'rgba(245,158,11,.15)',medium:'rgba(59,130,246,.15)',low:'rgba(16,185,129,.15)'};
  var scl={critical:'#ef4444',high:'#f59e0b',medium:'#3b82f6',low:'#10b981'};
  var bc={critical:'b-red',high:'b-amber',medium:'b-blue',low:'b-green'};
  if(!recent.length){el.innerHTML='<div style="padding:12px;text-align:center;color:var(--txt3);font-size:12px">لا توجد أعطال مسجلة</div>';return;}
  el.innerHTML=recent.map(function(f){
    var dt=calcDT(f.downtimeFrom,f.downtimeTo);
    return '<div class="ff-item">'+
    '<div class="ff-icon" style="background:'+sbg[f.severity]+';color:'+scl[f.severity]+'"><i class="ti ti-alert-triangle"></i></div>'+
    '<div class="ff-info"><div class="ff-title">'+f.typeAr+'</div>'+
    '<div class="ff-sub">'+f.machineName+' · '+f.dateTime+(dt?' · '+dt.label:'')+'</div></div>'+
    '<span class="badge '+bc[f.severity]+'">'+f.severity+'</span></div>';
  }).join('');
}

function buildEffChart(){
  var el=document.getElementById('effChart');if(!el)return;
  var labels=[],vals=[];
  var u=currentUser;
  u.shifts.forEach(function(s){
    var logs=energyReadings.filter(function(e){return e.shiftId===s.id;});
    var kwh=logs.reduce(function(a,b){return a+b.kwh;},0);
    var prod=logs.reduce(function(a,b){return a+b.production;},0);
    labels.push(s.name);vals.push(kwh>0?parseFloat((prod/kwh).toFixed(2)):0);
  });
  charts.eff=new Chart(el,{type:'bar',data:{labels:labels,datasets:[{data:vals,
    backgroundColor:u.shifts.map(function(s){return s.color;}),borderRadius:5}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
    scales:{x:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#64748b',font:{size:10}}},
            y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#64748b',font:{size:10}}}}}});
}

function updDT(){
  var f=document.getElementById('dtF'),t=document.getElementById('dtT'),r=document.getElementById('dtRes');
  if(!f||!t||!r)return;
  if(f.value&&t.value){
    var d=calcDT(f.value.replace('T',' '),t.value.replace('T',' '));
    if(d){r.style.display='block';r.innerHTML='<i class="ti ti-clock"></i> مدة التوقف: <strong>'+d.label+'</strong> ('+d.minutes+' دقيقة)';}
    else{r.style.display='block';r.innerHTML='<span style="color:var(--red)">⚠ تاريخ النهاية يجب أن يكون بعد البداية</span>';}
  }else r.style.display='none';
}

function submitFault(){
  var mEl=document.getElementById('fMach');
  var tEl=document.getElementById('fType');
  var dfEl=document.getElementById('dtF');
  var dtEl=document.getElementById('dtT');
  var noEl=document.getElementById('fNotes');
  var msg=document.getElementById('fMsg');
  if(!mEl||!mEl.value||!tEl||!tEl.value){
    msg.innerHTML='<div class="msg-e">يرجى اختيار الماكينة ونوع العطل</div>';return;
  }
  var machine=currentUser.machines.find(function(m){return m.id===mEl.value;});
  var type=faultTypes.find(function(t){return t.id===tEl.value;});
  var dtFrom=dfEl&&dfEl.value?dfEl.value.replace('T',' '):'';
  var dtTo=dtEl&&dtEl.value?dtEl.value.replace('T',' '):'';
  var dtCalc=calcDT(dtFrom,dtTo);
  var newF={
    id:uid(),machineId:mEl.value,machineName:machine?machine.name:'',
    typeId:tEl.value,typeAr:type?type.ar:'',severity:'medium',
    dateTime:fmtDT(),downtimeFrom:dtFrom,downtimeTo:dtTo,
    status:'open',notes:noEl?noEl.value:''
  };
  var btn=document.querySelector('#ct .btnp');
  if(btn){btn.disabled=true;btn.innerHTML='<i class="ti ti-loader"></i> جاري الحفظ...';}
  if(currentUser&&currentUser.id){
    supa.from('faults').insert({
      user_id:currentUser.id,machine_id:null,
      machine_name:newF.machineName,type_id:newF.typeId,type_ar:newF.typeAr,
      severity:'medium',date_time:newF.dateTime,downtime_from:newF.downtimeFrom,
      downtime_to:newF.downtimeTo,status:'open',notes:newF.notes
    }).select().single().then(function(res){
      if(res.error){
        msg.innerHTML='<div class="msg-e">خطأ: '+res.error.message+'</div>';
        if(btn){btn.disabled=false;btn.innerHTML='<i class="ti ti-send"></i> حفظ وإرسال للسجل';}
        return;
      }
      if(res.data) newF.id=res.data.id;
      faults.unshift(newF);
      if(dtFrom){
        supa.from('downtime_logs').insert({
          line_id:null,production_log_id:null,
          start_time:new Date(dtFrom).toISOString(),
          end_time:dtTo?new Date(dtTo).toISOString():null,
          duration_minutes:dtCalc?dtCalc.minutes:0,
          reason_category:newF.typeAr,
          comments:(newF.machineName+(newF.notes?' - '+newF.notes:'')).trim()
        }).then(function(){});
      }
      showToast('تم حفظ العطل ✓ · '+newF.typeAr+' — '+newF.machineName,'green');
      navigate('faultLog');
    });
  } else {
    faults.unshift(newF);
    showToast('تم تسجيل العطل ✓','green');
    navigate('faultLog');
  }
}

  '<input class="fi-sm ltr" type="date" id="flDate" placeholder="التاريخ" onchange="applyFilter()">'+
  '<select class="fi-sm" id="flMach" onchange="applyFilter()">'+machOpts+'</select>'+
  '<select class="fi-sm" id="flType" onchange="applyFilter()">'+typeOpts+'</select>'+
  '<select class="fi-sm" id="flSev" onchange="applyFilter()">'+
  '<option value="">كل الخطورة</option><option value="critical">حرج</option>'+
  '<option value="high">عالٍ</option><option value="medium">متوسط</option><option value="low">منخفض</option>'+
  '</select>'+
  '<select class="fi-sm" id="flSort" onchange="applyFilter()">'+
  '<option value="newest">الأحدث أولاً</option>'+
  '<option value="oldest">الأقدم أولاً</option>'+
  '<option value="longest">أطول توقف أولاً</option>'+
  '</select>'+
  '<button class="btno bsm" onclick="clearFilter()"><i class="ti ti-x"></i> مسح</button>'+
  '</div>'+

  '<div class="card" style="padding:0;overflow:hidden">'+
  '<div class="tbl-wrap" id="faultTableWrap">'+
  buildFaultTable(faults)+
  '</div></div>';
}

function buildFaultTable(list){
  var bc={critical:'b-red',high:'b-amber',medium:'b-blue',low:'b-green'};
  var stMap={open:'<span class="badge b-red">مفتوح</span>',
             inprogress:'<span class="badge b-amber">جارٍ</span>',
             resolved:'<span class="badge b-green">محلول</span>'};
  if(!list.length) return '<div style="padding:20px;text-align:center;color:var(--txt3);font-size:12px">لا توجد نتائج</div>';
  return '<table class="tbl"><thead><tr>'+
  '<th style="width:18%">الماكينة</th>'+
  '<th style="width:20%">نوع العطل</th>'+
  '<th style="width:10%">الخطورة</th>'+
  '<th style="width:18%">التاريخ والوقت</th>'+
  '<th style="width:17%">زمن التوقف</th>'+
  '<th style="width:10%">الحالة</th>'+
  '<th style="width:7%"></th>'+
  '</tr></thead><tbody>'+
  list.map(function(f){
    var dt=calcDT(f.downtimeFrom,f.downtimeTo);
    var dtCell=dt?'<span style="color:var(--amber);font-weight:700">'+dt.label+'</span>':
               (f.downtimeFrom&&!f.downtimeTo?'<span style="color:var(--red);font-size:10px">جارٍ التوقف…</span>':'<span style="color:var(--txt3)">—</span>');
    return '<tr>'+
    '<td style="color:var(--txt);font-weight:700;font-size:11px">'+f.machineName+'</td>'+
    '<td><span class="badge b-blue">'+f.typeAr+'</span></td>'+
    '<td><span class="badge '+bc[f.severity]+'">'+f.severity+'</span></td>'+
    '<td style="color:var(--txt3);font-size:10px;direction:ltr;text-align:right">'+f.dateTime+'</td>'+
    '<td>'+dtCell+'</td>'+
    '<td>'+(stMap[f.status]||f.status)+'</td>'+
    '<td><button class="btno bsm" onclick="closeFault(\''+f.id+'\')" title="إغلاق العطل" style="padding:3px 7px"><i class="ti ti-check"></i></button></td>'+
    '</tr>';
  }).join('')+'</tbody></table>';
}

function applyFilter(){
  var date=document.getElementById('flDate').value;
  var mach=document.getElementById('flMach').value;
  var type=document.getElementById('flType').value;
  var sev=document.getElementById('flSev').value;
  var sort=document.getElementById('flSort').value;
  var list=faults.filter(function(f){
    if(date&&!f.dateTime.startsWith(date))return false;
    if(mach&&f.machineId!==mach)return false;
    if(type&&f.typeId!==type)return false;
    if(sev&&f.severity!==sev)return false;
    return true;
  });
  if(sort==='oldest')list=list.slice().sort(function(a,b){return a.dateTime>b.dateTime?1:-1;});
  else if(sort==='longest')list=list.slice().sort(function(a,b){
    var da=calcDT(a.downtimeFrom,a.downtimeTo),db=calcDT(b.downtimeFrom,b.downtimeTo);
    return (db?db.minutes:0)-(da?da.minutes:0);
  });
  else list=list.slice().reverse();
  var el=document.getElementById('faultTableWrap');
  if(el)el.innerHTML=buildFaultTable(list);
  var cnt=document.getElementById('faultCount');
  if(cnt)cnt.textContent=list.length+' عطل / الإجمالي: '+faults.length;
}

function clearFilter(){
  ['flDate','flMach','flType','flSev'].forEach(function(id){var el=document.getElementById(id);if(el)el.value='';});
  var sort=document.getElementById('flSort');if(sort)sort.value='newest';
  applyFilter();
}

function closeFault(id){
  var f=faults.find(function(x){return x.id===id;});
  if(!f) return;
  var endTime=fmtDT();
  f.status='resolved';
  if(!f.downtimeTo) f.downtimeTo=endTime;
  if(currentUser && currentUser.id){
    supaCloseFault(id, f.downtimeTo).then(function(res){
      if(res.error) showToast('خطأ في التحديث: '+res.error,'red');
      else showToast('تم إغلاق العطل وحفظه في قاعدة البيانات ✓','green');
    });
  } else {
    showToast('تم إغلاق العطل وتسجيل وقت الانتهاء','green');
  }
  renderSidebar();applyFilter();
}

  var ct=document.getElementById('ct');

  var nowH=now().getHours()*60+now().getMinutes();

    var fh=parseInt(s.timeFrom.split(':')[0])*60+parseInt(s.timeFrom.split(':')[1]);

    var todayHasReading=energyReadings.some(function(e){return e.shiftId===s.id&&e.date===fmtDate();});

var _prevRead=0;
function updatePrevReading(){
  var shiftEl=document.getElementById('eShift');
  var machEl=document.getElementById('eMach');
  var dispEl=document.getElementById('prevReadDisplay');
  if(!shiftEl||!machEl||!dispEl)return;
  var sid=shiftEl.value,mid=machEl.value;
  /* find last reading for this machine regardless of shift */
  var allForMach=energyReadings.filter(function(e){return e.machineId===mid;});
  allForMach.sort(function(a,b){return (a.date+a.time)>(b.date+b.time)?-1:1;});
  if(allForMach.length){
    _prevRead=allForMach[0].meterReading;
    dispEl.style.color='var(--txt)';
    dispEl.textContent=_prevRead.toFixed(1)+' kWh';
  } else {
    _prevRead=0;
    dispEl.style.color='var(--txt3)';
    dispEl.textContent='لا توجد قراءة سابقة (أول تسجيل)';
  }
  calcEnergyUsed();
}

function calcEnergyUsed(){
  var meterEl=document.getElementById('eMeter');
  var prodEl=document.getElementById('eProd');
  var kwhBox=document.getElementById('kwhCalcBox');
  var kwhVal=document.getElementById('kwhCalcVal');
  var effBox=document.getElementById('effCalcBox');
  var effVal=document.getElementById('effCalcVal');
  if(!meterEl||!kwhBox||!kwhVal)return;
  var meter=parseFloat(meterEl.value)||0;
  if(meter>0&&meter>_prevRead){
    var kwh=meter-_prevRead;
    kwhBox.style.display='block';
    kwhVal.textContent=kwh.toFixed(2)+' kWh';
    var prod=parseInt(prodEl?prodEl.value:0)||0;
    if(prod>0&&kwh>0){
      effBox.style.display='block';
      effVal.textContent=(prod/kwh).toFixed(2);
    } else effBox.style.display='none';
  } else {
    kwhBox.style.display='none';
    effBox.style.display='none';
  }
}

function submitEnergy(){
  var shiftEl=document.getElementById('eShift'),machEl=document.getElementById('eMach'),
      dateEl=document.getElementById('eDate'),timeEl=document.getElementById('eTime'),
      meterEl=document.getElementById('eMeter'),prodEl=document.getElementById('eProd'),
      notesEl=document.getElementById('eNotes');
  var msg=document.getElementById('eMsgBox');
  var meter=parseFloat(meterEl?meterEl.value:0)||0;
  if(!shiftEl.value||!machEl.value||!dateEl.value||meter<=0){
    msg.innerHTML='<div class="msg-e">يرجى اختيار الوردية والماكينة وإدخال قراءة العداد</div>';return;
  }
  if(_prevRead>0&&meter<_prevRead){
    msg.innerHTML='<div class="msg-e">قراءة العداد يجب أن تكون أكبر من القراءة السابقة ('+_prevRead.toFixed(1)+')</div>';return;
  }
  var kwh=meter-(_prevRead||0);
  var shift=currentUser.shifts.find(function(s){return s.id===shiftEl.value;});
  var machine=currentUser.machines.find(function(m){return m.id===machEl.value;});
  var prod=parseInt(prodEl?prodEl.value:0)||0;
  var newReading={
    id:uid(),shiftId:shiftEl.value,shiftName:shift?shift.name:'',
    machineId:machEl.value,machineName:machine?machine.name:'',
    date:dateEl.value,time:timeEl?timeEl.value:fmtTime(),
    meterReading:meter,prevReading:_prevRead||0,
    kwh:parseFloat(kwh.toFixed(2)),production:prod,
    notes:notesEl?notesEl.value:''
  };
  if(currentUser && currentUser.id){
    var saveBtn=document.querySelector('.modal-box .btnp');
    if(saveBtn){saveBtn.disabled=true;saveBtn.innerHTML='<i class="ti ti-loader"></i> جاري الحفظ...';}
    supaAddEnergy(currentUser.id, newReading).then(function(res){
      if(res.error){
        showToast('خطأ في الحفظ: '+res.error,'red');
        if(saveBtn){saveBtn.disabled=false;saveBtn.innerHTML='<i class="ti ti-check"></i> حفظ قراءة العداد';}
        return;
      }
      if(res.data) newReading.id=res.data.id;
      energyReadings.push(newReading);
      closeModal();
      showToast('تم حفظ القراءة في قاعدة البيانات · '+kwh.toFixed(2)+' kWh','green');
      navigate('energy');
    });
  } else {
    energyReadings.push(newReading);
    closeModal();
    showToast('تم تسجيل قراءة العداد · استهلاك: '+kwh.toFixed(2)+' kWh','green');
    navigate('energy');
  }
}

function setAI(q){var el=document.getElementById('aiIn');if(el){el.value=q;sendAI();}}
async function sendAI(){
  var inp=document.getElementById('aiIn'),msgs=document.getElementById('chatMsgs');
  if(!inp||!msgs||!inp.value.trim())return;
  var q=inp.value.trim();inp.value='';
  var uDiv=document.createElement('div');uDiv.className='chat-msg user';uDiv.textContent=q;
  msgs.appendChild(uDiv);msgs.scrollTop=msgs.scrollHeight;
  var bDiv=document.createElement('div');bDiv.className='chat-msg bot';bDiv.textContent='⟳ جاري التحليل...';
  msgs.appendChild(bDiv);msgs.scrollTop=msgs.scrollHeight;
  try{
    var res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,
        system:'أنت مهندس صيانة صناعية خبير في G-Tech. أجب بإيجاز وعملية بالعربية.',
        messages:[{role:'user',content:q}]})});
    var data=await res.json();
    bDiv.textContent=(data.content&&data.content[0]&&data.content[0].text)||'تعذر الاتصال.';
  }catch(e){bDiv.textContent='تعذر الاتصال. تواصل مع info@gtech-a.com';}
  msgs.scrollTop=msgs.scrollHeight;
}
