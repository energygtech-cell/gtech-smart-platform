<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G-Tech Smart Factory Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080d18;--bg2:#0f1729;--bg3:#162035;--bg4:#1c2a44;
  --bdr:#1e3558;--bdr2:#2a4870;
  --txt:#e2e8f0;--txt2:#94a3b8;--txt3:#64748b;
  --green:#10b981;--gd:#064e3b;--gl:#d1fae5;
  --blue:#3b82f6;--bd:#1e3a8a;--bl:#dbeafe;
  --amber:#f59e0b;--ad:#78350f;--al:#fef3c7;
  --red:#ef4444;--rd:#7f1d1d;--rl:#fee2e2;
  --purple:#8b5cf6;--pd:#4c1d95;--pl:#ede9fe;
  --cyan:#06b6d4;--cd:#164e63;--cl:#cffafe;
  --acc:#00c8e0;--acc2:#0891b2;
}
body{background:var(--bg);color:var(--txt);font-family:'Cairo',sans-serif;font-size:13px;min-height:100vh}
.hidden{display:none!important}
input,select,textarea,button{font-family:'Cairo',sans-serif}
button{cursor:pointer}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}

/* AUTH */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px}
.auth-card{background:var(--bg2);border:1px solid var(--bdr);border-radius:16px;width:100%;max-width:420px;padding:32px}
.auth-logo{text-align:center;margin-bottom:24px}
.auth-logo-icon{width:60px;height:60px;background:linear-gradient(135deg,var(--acc2),var(--purple));border-radius:14px;display:inline-flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:10px}
.auth-logo h1{font-size:22px;font-weight:800;color:var(--txt)}
.auth-logo p{font-size:12px;color:var(--txt2);margin-top:3px}
.auth-tabs{display:flex;background:var(--bg3);border-radius:10px;padding:3px;margin-bottom:22px}
.auth-tab{flex:1;padding:9px;text-align:center;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;color:var(--txt2);border:none;background:transparent;transition:all .2s}
.auth-tab.active{background:var(--acc2);color:#fff}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:12px;color:var(--txt2);margin-bottom:5px;font-weight:500}
.input-wrap{position:relative}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--bdr);border-radius:8px;padding:10px 38px 10px 12px;color:var(--txt);font-size:13px;outline:none;transition:border .2s}
.form-input:focus{border-color:var(--acc)}
.form-input.ltr{direction:ltr;text-align:left;padding:10px 12px 10px 38px}
.input-icon{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--txt3);font-size:16px;pointer-events:none}
.form-select{width:100%;background:var(--bg3);border:1px solid var(--bdr);border-radius:8px;padding:10px 12px;color:var(--txt);font-size:13px;outline:none;transition:border .2s}
.form-select:focus{border-color:var(--acc)}
.btn-primary{width:100%;background:var(--acc2);border:none;border-radius:8px;padding:12px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-primary:hover{opacity:.9}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-outline{background:transparent;border:1px solid var(--bdr2);border-radius:8px;padding:8px 14px;color:var(--txt2);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-outline:hover{border-color:var(--acc);color:var(--acc)}
.btn-sm{padding:5px 12px!important;font-size:11px!important;border-radius:6px!important}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-check{display:flex;align-items:flex-start;gap:8px;font-size:11px;color:var(--txt2);cursor:pointer}
.form-check input{margin-top:2px;accent-color:var(--acc);cursor:pointer}
.trial-info{background:rgba(0,200,224,.08);border:1px solid rgba(0,200,224,.2);border-radius:8px;padding:10px 12px;margin-top:14px;font-size:11px;color:var(--acc);display:flex;align-items:center;gap:6px}
.msg-error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:6px;padding:8px 12px;font-size:11px;color:var(--red);margin-bottom:12px}
.msg-success{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);border-radius:6px;padding:8px 12px;font-size:11px;color:var(--green);margin-bottom:12px}
.divider{text-align:center;color:var(--txt3);font-size:11px;margin:14px 0;position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:var(--bdr)}
.divider::before{left:0}.divider::after{right:0}

/* APP LAYOUT */
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.trial-bar{background:var(--cd);padding:7px 16px;display:flex;align-items:center;gap:10px;font-size:11px;flex-shrink:0;justify-content:space-between}
.trial-days-pill{background:rgba(255,255,255,.2);color:#fff;border-radius:10px;padding:2px 10px;font-size:10px;font-weight:700}
.topbar{background:var(--bg2);border-bottom:1px solid var(--bdr);height:52px;display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0}
.logo-mini{display:flex;align-items:center;gap:8px}
.logo-icon-sm{width:32px;height:32px;background:linear-gradient(135deg,var(--acc2),var(--purple));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.logo-text{font-size:14px;font-weight:800;color:var(--txt)}
.logo-sub{font-size:10px;color:var(--txt2)}
.spacer{flex:1}
.lang-pill{display:flex;background:var(--bg3);border:1px solid var(--bdr);border-radius:20px;padding:2px;gap:1px}
.lbtn{padding:3px 10px;border-radius:16px;font-size:11px;font-weight:700;border:none;background:transparent;color:var(--txt2);cursor:pointer;transition:all .2s}
.lbtn.active{background:var(--acc2);color:#fff}
.top-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--bdr);background:transparent;color:var(--txt2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .2s;position:relative}
.top-btn:hover{border-color:var(--acc);color:var(--acc)}
.notif-badge::after{content:'3';position:absolute;top:-4px;right:-4px;width:15px;height:15px;background:var(--red);border-radius:50%;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;color:#fff}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;cursor:pointer;color:#fff;flex-shrink:0}

/* BODY LAYOUT */
.app-body{display:flex;flex:1;overflow:hidden}
.sidebar{width:200px;background:var(--bg2);border-left:1px solid var(--bdr);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sb-sec{padding:12px 10px 3px;font-size:9px;color:var(--txt3);font-weight:700;letter-spacing:.8px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 12px;margin:1px 6px;border-radius:7px;cursor:pointer;color:var(--txt2);font-size:12px;transition:all .2s;user-select:none;direction:rtl}
.nav-item:hover{background:var(--bg3);color:var(--txt)}
.nav-item.active{background:var(--bg4);color:var(--acc);border:1px solid rgba(0,200,224,.15)}
.nav-item i{font-size:15px;flex-shrink:0}
.nav-item .nbadge{margin-right:auto;background:var(--red);color:#fff;border-radius:8px;padding:1px 5px;font-size:9px;font-weight:700}
.sb-bottom{margin-top:auto;padding:10px 6px;border-top:1px solid var(--bdr)}
.content{flex:1;overflow-y:auto;background:var(--bg);padding:16px}

/* PAGE */
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;direction:rtl}
.ph-title{font-size:18px;font-weight:800;color:var(--txt)}
.ph-sub{font-size:11px;color:var(--txt2);margin-top:2px}
.ph-actions{display:flex;gap:8px}

/* STAT CARDS */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.sc{background:var(--bg2);border:1px solid var(--bdr);border-radius:12px;padding:12px;direction:rtl;transition:border .2s;cursor:pointer}
.sc:hover{border-color:var(--bdr2)}
.sc-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;margin-bottom:8px}
.sc-lbl{font-size:10px;color:var(--txt2);margin-bottom:4px}
.sc-val{font-size:22px;font-weight:800;color:var(--txt);line-height:1}
.sc-ch{font-size:10px;margin-top:3px}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--bdr);border-radius:12px;padding:14px}
.card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;direction:rtl}
.card-title{font-size:13px;font-weight:700}
.card-act{font-size:11px;color:var(--acc);cursor:pointer}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
.b-red{background:var(--rd);color:var(--rl)}
.b-amber{background:var(--ad);color:var(--al)}
.b-blue{background:var(--bd);color:var(--bl)}
.b-green{background:var(--gd);color:var(--gl)}
.b-purple{background:var(--pd);color:var(--pl)}
.b-cyan{background:var(--cd);color:var(--cl)}

/* TABLE */
.tbl-wrap{overflow-x:auto}
.tbl{width:100%;border-collapse:collapse;font-size:12px;direction:rtl}
.tbl th{text-align:right;padding:8px 10px;font-size:10px;color:var(--txt3);font-weight:700;border-bottom:1px solid var(--bdr);text-transform:uppercase;letter-spacing:.3px}
.tbl td{padding:9px 10px;border-bottom:1px solid rgba(30,53,88,.4);color:var(--txt2);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(30,53,88,.25)}

/* FAULT FEED */
.ff-item{display:flex;align-items:center;gap:9px;padding:8px 10px;background:var(--bg3);border:1px solid var(--bdr);border-radius:8px;direction:rtl;margin-bottom:6px}
.ff-icon{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.ff-info{flex:1;min-width:0}
.ff-title{font-size:12px;font-weight:700;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ff-sub{font-size:10px;color:var(--txt2)}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:blink 1.5s infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes slideIn{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:translateX(0)}}

/* FAULT FORM */
.ftype-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:8px 0 14px}
.ftype-card{background:var(--bg3);border:1px solid var(--bdr);border-radius:8px;padding:10px 6px;text-align:center;cursor:pointer;transition:all .2s;font-size:11px;color:var(--txt2)}
.ftype-card:hover{border-color:var(--bdr2);color:var(--txt)}
.ftype-card.selected{border-color:var(--acc);background:rgba(0,200,224,.08);color:var(--acc)}
.ftype-card i{font-size:24px;display:block;margin-bottom:5px}
.sev-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:8px 0 14px}
.sev-btn{padding:10px 6px;border:1px solid var(--bdr);background:var(--bg3);border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;text-align:center;color:var(--txt2);transition:all .2s}
.sev-btn:hover{border-color:var(--bdr2)}
.sev-btn.s-critical{border-color:var(--red);background:rgba(239,68,68,.1);color:var(--red)}
.sev-btn.s-high{border-color:var(--amber);background:rgba(245,158,11,.1);color:var(--amber)}
.sev-btn.s-medium{border-color:var(--blue);background:rgba(59,130,246,.1);color:var(--blue)}
.sev-btn.s-low{border-color:var(--green);background:rgba(16,185,129,.1);color:var(--green)}

/* ADMIN */
.admin-hero{background:linear-gradient(135deg,var(--purple),var(--acc2));border-radius:12px;padding:16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;direction:rtl}
.client-card{background:var(--bg3);border:1px solid var(--bdr);border-radius:10px;padding:12px;direction:rtl;cursor:pointer;transition:border .2s}
.client-card:hover{border-color:var(--bdr2)}
.cc-av{width:38px;height:38px;border-radius:9px;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:var(--acc);flex-shrink:0;border:1px solid var(--bdr)}
.pbar-w{height:4px;background:var(--bg);border-radius:2px;overflow:hidden;margin-top:3px}
.pbar{height:100%;border-radius:2px;transition:width .6s}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:200}
.modal-box{background:var(--bg2);border:1px solid var(--bdr2);border-radius:14px;padding:22px;width:92%;max-width:420px;direction:rtl;max-height:90vh;overflow-y:auto}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}

/* TOAST */
#toasts{position:fixed;bottom:16px;left:16px;z-index:300;display:flex;flex-direction:column;gap:6px}
.toast{background:var(--bg2);border:1px solid var(--bdr2);border-radius:8px;padding:10px 16px;font-size:12px;display:flex;align-items:center;gap:8px;animation:slideIn .3s ease;direction:rtl}

/* AI CHAT */
.chat-box{display:flex;flex-direction:column;height:260px}
.chat-msgs{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:8px}
.chat-msg{padding:10px 12px;border-radius:10px;font-size:12px;line-height:1.7;max-width:88%}
.chat-msg.bot{background:var(--bg3);border:1px solid var(--bdr);align-self:flex-end;direction:rtl;text-align:right}
.chat-msg.user{background:var(--bd);align-self:flex-start;direction:rtl}
.chat-input-row{display:flex;gap:8px;padding-top:8px;border-top:1px solid var(--bdr)}

/* LTR content */
.ltr-content{direction:ltr;text-align:left}

/* NO COPY */
body{-webkit-user-select:none;-moz-user-select:none;user-select:none}
</style>
</head>

<div id="toasts"></div>

/* ===================== STATE ===================== */
var lang = 'ar';

var authTab = 'login';
var currentUser = null;

var faults = [

/* ===================== RENDER ===================== */
function render(){
  destroyCharts();
  if(screen === 'auth') renderAuth();
  else renderApp();
}

/* ===================== AUTH ===================== */
function renderAuth(){
  var isLogin = authTab === 'login';
  document.getElementById('root').innerHTML =
  '<div class="auth-wrap">' +
  '<div class="auth-card">' +
  '<div class="auth-logo">' +
  '<div class="auth-logo-icon">⚙</div>' +

  '</div>' +

function doRegister(){
  var n=document.getElementById('rName'), e=document.getElementById('rEmail'),
      c=document.getElementById('rCompany'), p=document.getElementById('rPhone'),
      pw=document.getElementById('rPw'), tm=document.getElementById('rTerms');
  var m=document.getElementById('authMsg');
  if(!n||!e||!c||!p||!pw) return;
  if(!n.value||!e.value||!c.value||!p.value||!pw.value){

function submitFault(){
  var tEl=document.getElementById('fTitle');
  var mEl=document.getElementById('fMachine');
  var sEl=document.getElementById('fStatus');
  var nEl=document.getElementById('fNotes');
  var msg=document.getElementById('fMsg');
  if(!selectedType||!selectedSev||!tEl||!tEl.value.trim()){
    if(msg) msg.innerHTML='<div class="msg-error">'+t('selectTypeAndSev')+'</div>';
    return;
  }
  var now=new Date();
  var timeStr=now.getHours()+':'+(now.getMinutes()<10?'0':'')+now.getMinutes();
  var typeArMap={mechanical:'ميكانيكي',electrical:'كهربائي',hydraulic:'هيدروليك',thermal:'حراري',sensor:'حساسات',structural:'هيكلي'};
  var mVal=mEl?mEl.value:'CNC A1';
  var mArMap={'CNC A1':'ماكينة CNC أ1','Press B2':'مكبس هيدروليكي ب2','Conveyor':'خط النقل'};
  faults.push({
    id: faults.length+1,
    type: selectedType, typeAr: typeArMap[selectedType]||selectedType,
    title: tEl.value.trim(), titleAr: tEl.value.trim(),
    machine: mVal, machineAr: mArMap[mVal]||mVal,
    severity: selectedSev,
    time: timeStr,
    status: sEl?sEl.value:'open',
    notes: nEl?nEl.value:''
  });
  selectedType=''; selectedSev='';
  showToast(t('faultAdded'), 'green');
  navigate('dashboard');
}

function setAI(q){ var el=document.getElementById('aiIn'); if(el){el.value=q; sendAI();} }

async function sendAI(){
  var inp=document.getElementById('aiIn');
  var msgs=document.getElementById('chatMsgs');
  if(!inp||!msgs||!inp.value.trim()) return;
  var q=inp.value.trim(); inp.value='';
  var uDiv=document.createElement('div');
  uDiv.className='chat-msg user'; uDiv.textContent=q;
  msgs.appendChild(uDiv); msgs.scrollTop=msgs.scrollHeight;
  var bDiv=document.createElement('div');
  bDiv.className='chat-msg bot'; bDiv.textContent='⟳ جاري التحليل...';
  msgs.appendChild(bDiv); msgs.scrollTop=msgs.scrollHeight;
  try{
    var res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,
        system:'أنت مهندس صيانة صناعية خبير في G-Tech. أجب بإيجاز وعملية بالعربية.',
        messages:[{role:'user',content:q}]})
    });
    var data=await res.json();
    bDiv.textContent=(data.content&&data.content[0]&&data.content[0].text)||'تعذر الاتصال.';
  }catch(e){
    bDiv.textContent='تعذر الاتصال. تواصل مع info@gtech-a.com';
  }
  msgs.scrollTop=msgs.scrollHeight;
}

  '<div style="font-size:10px;color:var(--txt3)">أعطال اليوم</div></div>' +
  '</div>' +
  '<div style="font-size:11px;font-weight:700;color:var(--acc);margin-bottom:8px">بيانات التواصل</div>' +
  '<div style="font-size:12px;color:var(--txt);border:1px solid var(--bdr);border-radius:8px;overflow:hidden">' +
  '<div style="padding:8px 12px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:8px">' +
  '<i class="ti ti-mail" style="color:var(--acc)"></i>'+c.email+'</div>' +
  '<div style="padding:8px 12px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:8px">' +
  '<i class="ti ti-phone" style="color:var(--green)"></i>'+c.phone+'</div>' +
  '<div style="padding:8px 12px;display:flex;align-items:center;gap:8px">' +
  '<i class="ti ti-building" style="color:var(--blue)"></i>'+c.companyAr+'</div>' +
  '</div>' +
  (c.plan==='trial'?'<div class="trial-info" style="margin-top:10px"><i class="ti ti-clock"></i> تجريبي: '+c.trialDays+' أيام متبقية</div>':'<div style="margin-top:10px"><span class="badge b-green" style="font-size:11px">خطة مدفوعة نشطة</span></div>') +
  '<div style="display:flex;gap:8px;margin-top:14px">' +
  '<button class="btn-outline btn-sm" style="flex:1;justify-content:center;color:var(--green)"><i class="ti ti-message"></i> '+t('sendMsg')+'</button>' +
  (c.status==='active'
    ?'<button class="btn-outline btn-sm" style="flex:1;justify-content:center;color:var(--amber)"><i class="ti ti-pause"></i> '+t('suspend')+'</button>'
    :'<button class="btn-outline btn-sm" style="flex:1;justify-content:center;color:var(--green)"><i class="ti ti-play"></i> '+t('activate')+'</button>') +
  '</div></div></div>';
}

/* ===================== SYSTEM STATUS ===================== */
function renderSystemStatus(){
  var ct=document.getElementById('ct');
  var svcs=[
    {name:'API Gateway',status:'operational',uptime:'99.98%',resp:'42ms'},
    {name:'Database Cluster',status:'operational',uptime:'99.95%',resp:'8ms'},
    {name:'Claude AI Engine',status:'operational',uptime:'99.9%',resp:'850ms'},
    {name:'Real-time Sensors',status:'operational',uptime:'99.7%',resp:'12ms'},
    {name:'Email Service',status:'degraded',uptime:'97.2%',resp:'320ms'},
    {name:'File Storage',status:'operational',uptime:'100%',resp:'28ms'},
  ];
  ct.innerHTML=
  '<div class="ph"><div class="ph-title">'+t('systemStatus')+'</div>' +
  '<div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--green)"><span class="live-dot"></span>'+t('allOk')+'</div></div>' +
  '<div class="card"><div class="tbl-wrap"><table class="tbl">' +
  '<thead><tr><th>الخدمة</th><th>الحالة</th><th>Uptime</th><th>زمن الاستجابة</th></tr></thead><tbody>' +
  svcs.map(function(s){
    return '<tr><td style="color:var(--txt);font-weight:700">'+s.name+'</td>' +
    '<td><span class="badge '+(s.status==='operational'?'b-green':'b-amber')+'">'+(s.status==='operational'?'يعمل':'متأثر')+'</span></td>' +
    '<td style="color:var(--green)">'+s.uptime+'</td>' +
    '<td style="color:var(--txt2)">'+s.resp+'</td></tr>';
  }).join('') +
  '</tbody></table></div></div>';
}

/* ===================== HELPERS ===================== */
function mkStat(icon,color,label,value,change,dir){
  var cols={red:'#ef4444',blue:'#3b82f6',amber:'#f59e0b',purple:'#8b5cf6',green:'#10b981'};
  var bgs={red:'rgba(239,68,68,.1)',blue:'rgba(59,130,246,.1)',amber:'rgba(245,158,11,.1)',purple:'rgba(139,92,246,.1)',green:'rgba(16,185,129,.1)'};
  return '<div class="sc">' +
  '<div class="sc-icon" style="background:'+bgs[color]+';color:'+cols[color]+'">' +
  '<i class="ti '+icon+'"></i></div>' +
  '<div class="sc-lbl">'+label+'</div>' +
  '<div class="sc-val">'+value+'</div>' +
  '<div class="sc-ch" style="color:'+cols[color]+'"><i class="ti ti-arrow-'+(dir==='up'?'up':'down')+'-right"></i> '+change+'</div>' +
  '</div>';
}

function showReportModal(){
  document.getElementById('modal').innerHTML=
  '<div class="modal-bg" onclick="closeMBg(event)">' +
  '<div class="modal-box">' +
  '<div class="modal-hdr">' +
  '<div style="font-size:14px;font-weight:700"><i class="ti ti-download" style="margin-left:6px"></i>تصدير التقرير</div>' +
  '<button class="btn-outline btn-sm" onclick="closeModal()">×</button></div>' +
  '<div class="form-group"><label class="form-label">فترة التقرير</label>' +
  '<select class="form-select"><option>آخر 7 أيام</option><option>آخر 30 يوم</option><option>هذا الشهر</option></select></div>' +
  '<div style="display:flex;flex-direction:column;gap:6px;margin-bottom:14px">' +
  '<label class="form-check"><input type="checkbox" checked style="accent-color:var(--acc)"> تضمين الرسوم البيانية</label>' +
  '<label class="form-check"><input type="checkbox" checked style="accent-color:var(--acc)"> تضمين سجل الأعطال</label>' +
  '<label class="form-check"><input type="checkbox" style="accent-color:var(--acc)"> تضمين جدول الصيانة</label>' +
  '</div>' +
  '<div id="rMsg" style="font-size:11px;min-height:16px;margin-bottom:8px"></div>' +
  '<button class="btn-primary" id="rBtn" onclick="doExport()"><i class="ti ti-download"></i> تصدير PDF</button>' +
  '</div></div>';
}

function doExport(){
  var btn=document.getElementById('rBtn');
  var msg=document.getElementById('rMsg');
  if(btn){btn.disabled=true;btn.innerHTML='<i class="ti ti-loader"></i> جاري التحضير...';}
  if(msg){msg.textContent='جاري تجميع البيانات...';msg.style.color='var(--amber)';}
  setTimeout(function(){
    if(btn){btn.disabled=false;btn.innerHTML='<i class="ti ti-check"></i> التقرير جاهز!';}
    if(msg){msg.textContent='✅ G-Tech_Report_'+new Date().toISOString().slice(0,10)+'.pdf';msg.style.color='var(--green)';}
  },2000);
}

function showToast(msg,color){
  var tw=document.getElementById('toasts');
  var d=document.createElement('div');
  d.className='toast';
  d.style.color='var(--'+color+')';
  d.innerHTML='<i class="ti ti-check-circle" style="font-size:15px"></i> '+msg;
  tw.appendChild(d);
  setTimeout(function(){if(d.parentNode)d.remove();},3500);
}

function closeModal(){ document.getElementById('modal').innerHTML=''; }
function closeMBg(e){ if(e&&e.target.classList.contains('modal-bg')) closeModal(); }
function destroyCharts(){ Object.keys(charts).forEach(function(k){if(charts[k])charts[k].destroy();}); charts={}; }
function setLang(l){ lang=l; showToast(l==='ar'?'تم التبديل للعربية':'Switched to English','blue'); }

/* PROTECTION */
document.addEventListener('contextmenu',function(e){e.preventDefault();});
document.addEventListener('keydown',function(e){if((e.ctrlKey||e.metaKey)&&['s','u','p','a','c'].includes(e.key))e.preventDefault();});
document.addEventListener('selectstart',function(e){e.preventDefault();});

/* START */
render();
</script>
